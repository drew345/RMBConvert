<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f7f4ec">
    <title>RMB Dollar Converter</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="converter" aria-label="RMB and dollar converter">
        <div class="mode-toggle" role="tablist" aria-label="Conversion direction">
          <button class="mode active" id="cnyToUsd" type="button" role="tab" aria-selected="true">RMB to USD</button>
          <button class="mode" id="usdToCny" type="button" role="tab" aria-selected="false">USD to RMB</button>
        </div>

        <label class="amount-label" for="amountInput">
          <span id="inputLabel">RMB amount</span>
          <div class="amount-row">
            <span id="inputSymbol">RMB</span>
            <input id="amountInput" type="number" inputmode="decimal" min="0" step="0.01" value="100" autocomplete="off">
          </div>
        </label>

        <div class="quick-grid" id="quickAmounts" aria-label="Quick amounts"></div>

        <div class="result-panel" aria-live="polite">
          <span class="muted" id="resultLabel">USD</span>
          <output id="resultValue">$0.00</output>
          <button id="copyResult" type="button">Copy</button>
        </div>

        <details class="settings">
          <summary>Custom rate</summary>
          <label for="customRate">
            CNY per 1 USD
            <input id="customRate" type="number" inputmode="decimal" min="0" step="0.0001" placeholder="Example: 7.25">
          </label>
          <div class="settings-actions">
            <button id="useCustom" type="button">Use custom</button>
            <button id="useLive" type="button">Use live</button>
          </div>
        </details>

        <footer class="info-footer">
          <div class="top-bar">
            <div>
              <p class="kicker">China quick convert</p>
            </div>
            <button class="icon-button" id="refreshRate" type="button" aria-label="Refresh live exchange rate" title="Refresh rate">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M21 12a9 9 0 0 1-15.6 6.1M3 12A9 9 0 0 1 18.6 5.9"/>
                <path d="M21 4v6h-6M3 20v-6h6"/>
              </svg>
            </button>
          </div>

          <div class="rate-strip">
            <div>
              <span class="muted">Rate</span>
              <strong id="rateLabel">Loading...</strong>
            </div>
            <span class="pill" id="rateStatus">Live</span>
          </div>
        </footer>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
